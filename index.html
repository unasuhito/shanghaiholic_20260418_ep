<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2025.08.30 EP</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: 'futura', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.8;
      background: #111111;
      color: #e0e0e0;
      padding: 20px 15px;
      min-height: 100vh;
    }
    
    h1, h2 {
      text-align: center;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 2px;
    }
    
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin-bottom: 40px;
    }
    
    h2 {
      font-size: clamp(1.2rem, 3vw, 1.5rem);
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }
    
    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .tab-button {
      padding: 15px 20px;
      cursor: pointer;
      background: none;
      border: none;
      font-size: clamp(14px, 2.5vw, 16px);
      font-weight: 400;
      color: #888;
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      letter-spacing: 1px;
      min-width: fit-content;
    }
    
    .tab-button:hover {
      color: #ffffff;
      background: #222222;
    }
    
    .tab-button.active {
      color: #ffffff;
      background: #1a1a1a;
    }
    
    .tab-button.active::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: #ffffff;
      border-radius: 2px;
    }
    
    .tab-content {
      background: #0f0f0f;
      border: 1px solid #333333;
      padding: clamp(20px, 4vw, 35px);
      border-radius: 12px;
    }
    
    .tab-pane {
      display: none;
    }
    
    .tab-pane.active {
      display: block;
      animation: fadeInUp 0.4s ease-out;
    }
    
    pre {
      white-space: pre-wrap;
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      font-size: clamp(14px, 2.5vw, 16px);
      margin: 20px 0;
      line-height: 1.9;
      color: #d0d0d0;
      padding: 10px 0;
    }
    
    audio {
      width: 100%;
      margin-top: 25px;
      border-radius: 8px;
      background: #1a1a1a;
      outline: none;
    }
    
    audio::-webkit-media-controls-panel {
      background: rgba(0, 0, 0, 0.8);
    }
    
    @keyframes fadeInUp {
      from { 
        opacity: 0;
        transform: translateY(20px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* スクロールバーのスタイリング */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #222222;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #555555;
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #777777;
    }
    
    /* タブレット用スタイル */
    @media (max-width: 768px) {
      body {
        padding: 15px 10px;
      }
      
      .tabs {
        justify-content: flex-start;
        padding-bottom: 0;
      }
      
      .tab-button {
        padding: 12px 16px;
        font-size: 14px;
      }
      
      .tab-content {
        padding: 20px 15px;
        border-radius: 8px;
      }
      
      h1 {
        margin-bottom: 30px;
      }
    }
    
    /* スマートフォン用スタイル */
    @media (max-width: 480px) {
      body {
        padding: 10px 8px;
      }
      
      .tab-button {
        padding: 10px 12px;
        font-size: 13px;
      }
      
      .tab-content {
        padding: 15px 12px;
        margin: 0 -2px;
      }
      
      pre {
        font-size: 13px;
        line-height: 1.8;
      }
      
      audio {
        margin-top: 20px;
      }
    }
    
    /* 極小画面用 */
    @media (max-width: 320px) {
      .tab-button {
        padding: 8px 10px;
        font-size: 12px;
      }
      
      .tab-content {
        padding: 12px 8px;
      }
      
      pre {
        font-size: 12px;
      }
    }
    
    /* ダークテーマ特有の調整 */
    @media (prefers-color-scheme: dark) {
      body {
        background: #111111;
      }
    }
    
    /* ホバーエフェクトをタッチデバイスで無効化 */
    @media (hover: none) {
      .tab-button:hover {
        background: none;
      }
    }
    
    /* フッター */
    .footer {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    
    .artist-photo {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      object-fit: cover;
      margin: 0 auto 20px;
      display: block;
      border: 1px solid #333333;
    }

    .rogo-photo {
      width: 300px;
      height: 80px;
      object-fit: cover;
      margin: 0 auto 20px;
      display: block;
    }
    
    .artist-name {
      font-size: clamp(1.2rem, 3vw, 1.5rem);
      color: #ffffff;
      margin-bottom: 25px;
      font-weight: 300;
      letter-spacing: 1px;
    }
    
    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: #1a1a1a;
      color: #888;
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid #333333;
      transition: all 0.3s ease;
      font-size: 18px;
    }
    
    .social-link:hover {
      color: #ffffff;
      background: #222222;
      border-color: #555555;
    }
    
    .social-link:focus {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }
    
    /* タブレット用 */
    @media (max-width: 768px) {
      .footer {
        margin-top: 40px;
        padding-top: 30px;
      }
      
      .artist-photo {
        width: 100px;
        height: 100px;
      }
      
      .social-links {
        gap: 15px;
      }
      
      .social-link {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }
    }
    
    /* フォーカス状態の改善 */
    .tab-button:focus {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }
    
    /* 高解像度ディスプレイ対応 */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      h1, h2 {
        text-rendering: optimizeLegibility;
      }
    }
  </style>
</head>
<body>
  <h1>2026.04.18 EP</h1>
  <div class="tabs">
    <button class="tab-button active" data-tab="tab1" data-file="fukazume.txt">fukazume</button>
    <button class="tab-button" data-tab="tab2" data-file="jamamon.txt">jamamon</button>
    <button class="tab-button" data-tab="tab3" data-file="unasuhito.txt">unasuhito</button>
    <button class="tab-button" data-tab="tab4" data-file="透明になっていく.txt">透明になっていく</button>
    <button class="tab-button" data-tab="tab5" data-file="clean-freak.txt">clean-freak</button>
  </div>

  <div id="tab1" class="tab-content tab-pane active">
    <h2>fukazume</h2>
    <pre class="lyrics-display">歌詞を読み込み中...</pre>
    <audio controls src="audios/fukazume.mp3"></audio>
  </div>

  <div id="tab2" class="tab-content tab-pane">
    <h2>jamamon</h2>
    <pre class="lyrics-display"></pre>
    <audio controls src="audios/jamamon.mp3"></audio>
  </div>

  <div id="tab3" class="tab-content tab-pane">
    <h2>unasuhito</h2>
    <pre class="lyrics-display"></pre>
    <audio controls src="audios/unasuhito.mp3"></audio>
  </div>

  <div id="tab4" class="tab-content tab-pane">
    <h2>透明になっていく</h2>
    <pre class="lyrics-display"></pre>
    <audio controls src="audios/透明になっていく.mp3"></audio>
  </div>

  <div id="tab5" class="tab-content tab-pane">
    <h2>clean-freak</h2>
    <pre class="lyrics-display"></pre>
    <audio controls src="audios/clean-freak.mp3"></audio>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tabButtons = document.querySelectorAll('.tab-button');
      const tabPanes = document.querySelectorAll('.tab-pane');
      const lyricsDir = 'lyrics/'; // 歌詞ファイルのフォルダ名

      // 歌詞をフェッチして表示する関数
      async function loadLyrics(button) {
        const fileName = button.dataset.file;
        const targetTabId = button.dataset.tab;
        const targetPre = document.querySelector(`#${targetTabId} .lyrics-display`);

        // すでに読み込み済み（中身が空でない）なら再読み込みしない場合はここを調整
        if (!fileName) return;

        try {
          const response = await fetch(lyricsDir + fileName);
          if (!response.ok) throw new Error('Network response was not ok');
          const text = await response.text();
          targetPre.textContent = text;
        } catch (error) {
          targetPre.textContent = '歌詞の読み込みに失敗しました。';
          console.error('Fetch error:', error);
        }
      }

      // 初期表示タブの歌詞を読み込む
      const activeTab = document.querySelector('.tab-button.active');
      if (activeTab) loadLyrics(activeTab);

      tabButtons.forEach(button => {
        button.addEventListener('click', () => {
          tabButtons.forEach(btn => btn.classList.remove('active'));
          tabPanes.forEach(pane => pane.classList.remove('active'));

          button.classList.add('active');
          const targetPane = document.getElementById(button.dataset.tab);
          targetPane.classList.add('active');

          // タブ切り替え時に歌詞を読み込む
          loadLyrics(button);
        });
      });

      // キーボードナビゲーション（既存のコードを維持）
      tabButtons.forEach((button, index) => {
        button.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowLeft' && index > 0) {
            e.preventDefault();
            tabButtons[index - 1].focus();
          } else if (e.key === 'ArrowRight' && index < tabButtons.length - 1) {
            e.preventDefault();
            tabButtons[index + 1].focus();
          }
        });
      });
    });
  </script>
</body>
