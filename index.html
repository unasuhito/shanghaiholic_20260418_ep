<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Asset&family=Kosugi+Maru&family=Noto+Sans+JP:wght@100..900&family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
  <title>2025.08.30 EP</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: 'futura', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.8;
      background: #111111;
      color: #e0e0e0;
      /* 上部プレイヤー分の余白を確保 */
      padding: 110px 15px 20px; 
      min-height: 100vh;
    }

    /* --- Asset Font Style --- */
    .asset-regular {
      font-family: "Asset", serif;
      font-weight: 400;
      font-style: normal;
    }

    /* --- 上部固定プレイヤー (Apple Musicライク) --- */
    .player-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      z-index: 1000;
    }

    /* ブラウザ標準のaudio要素をカスタマイズして配置 */
    #main-player {
      width: 100%;
      max-width: 600px;
      height: 40px;
      outline: none;
    }
    
    /* audio::-webkit-media-controls-panel {
      background: rgba(255, 255, 255, 0.1);
    } */

    h1 {
      text-align: center;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 2px;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin-bottom: 40px;
    }
    
    /* --- 曲リスト (旧 tabs) --- */
    .track-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 40px;
    }
    
    .track-item {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 8px;
      overflow: hidden; /* 歌詞展開時のアニメーション用 */
      transition: background 0.3s ease;
    }

    .track-item:hover {
      background: #222222;
    }

    /* アクティブ（歌詞表示中）のスタイル */
    .track-item.active {
      border-color: #555555;
    }

    /* --- 曲ヘッダー (再生ボタン + 曲名) --- */
    .track-header {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      cursor: pointer; /* 曲名クリックで歌詞展開 */
    }

    /* 再生ボタンのスタイル */
    .play-trigger {
      background: none;
      border: none;
      color: #888;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      margin-right: 20px;
      width: 30px;
      text-align: center;
      transition: color 0.3s ease, transform 0.2s ease;
    }

    .play-trigger:hover {
      color: #ffffff;
      transform: scale(1.1);
    }

    /* 現在再生中の曲のボタン色 */
    .track-item.playing .play-trigger {
      color: rgba(255, 180, 0, 0.9);
    }

    .track-title {
      flex: 1;
      font-size: clamp(16px, 3vw, 18px);
      letter-spacing: 1px;
      color: #ffffff;
    }

    /* 日本語曲名のスケール（以前のご要望を維持） */
    .jptxt-scale {
      display: inline-block;
      transform-origin: left center;
      transform: scale(1.1, 1.0); /* 少し控えめに調整 */
    }

    /* --- 歌詞表示エリア (旧 tab-content) --- */
    .lyrics-container {
      /* デフォルトは非表示 */
      display: none; 
      padding: 0 20px 20px 70px; /* 再生ボタンの分インデント */
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: #0f0f0f;
      animation: fadeInDown 0.4s ease-out;
    }

    /* アクティブな曲の歌詞を表示 */
    .track-item.active .lyrics-container {
      display: block;
    }

    pre {
      white-space: pre-wrap;
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      font-size: clamp(14px, 2.5vw, 16px);
      margin: 20px 0 0;
      line-height: 1.9;
      color: #d0d0d0;
    }
    
    @keyframes fadeInDown {
      from { 
        opacity: 0;
        transform: translateY(-10px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* スクロールバーのスタイリング (現在のものを維持) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #222222; }
    ::-webkit-scrollbar-thumb { background: #555555; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #777777; }
    
    /* --- レスポンシブ対応 --- */
    @media (max-width: 480px) {
      body { padding-top: 100px; }
      .player-bar { height: 80px; }
      .track-header { padding: 12px 15px; }
      .play-trigger { font-size: 20px; margin-right: 15px; width: 25px; }
      .lyrics-container { padding-left: 55px; }
      pre { font-size: 13px; line-height: 1.8; }
    }
    
    /* ホバーエフェクトをタッチデバイスで無効化 */
    @media (hover: none) {
      .track-item:hover { background: #1a1a1a; }
      .play-trigger:hover { color: #888; transform: none; }
    }
    
    /* --- フッター (現在のものを維持) --- */
    .footer {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    .rogo-photo {
      width: 300px;
      height: 80px;
      object-fit: cover;
      margin: 0 auto 20px;
      display: block;
    }
    .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
    .social-link {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; background: #1a1a1a; color: #888;
      text-decoration: none; border-radius: 8px; border: 1px solid #333333;
      transition: all 0.3s ease; font-size: 18px;
    }
    .social-link:hover { color: #ffffff; background: #222222; border-color: #555555; }
  </style>
</head>
<body>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const player = document.getElementById('main-player');
      const trackItems = document.querySelectorAll('.track-item');
      const lyricsDir = 'lyrics/';
      let currentPlayingIndex = -1; // 現在再生中の曲のインデックス

      // --- 関数: 歌詞をフェッチして表示 ---
      async function loadLyrics(trackItem) {
        const fileName = trackItem.dataset.lyrics;
        const preElement = trackItem.querySelector('.lyrics-display');

        // すでに歌詞が読み込まれている場合はスキップ
        if (!fileName || (preElement.textContent !== "" && preElement.textContent !== "歌詞を読み込み中...")) return;

        try {
          const response = await fetch(lyricsDir + fileName);
          if (!response.ok) throw new Error('歌詞が見つかりません');
          const text = await response.text();
          preElement.textContent = text;
        } catch (error) {
          preElement.textContent = '歌詞の読み込みに失敗しました。';
          console.error(error);
        }
      }

      // --- 関数: 指定したインデックスの曲を再生 ---
      function playTrack(index) {
        if (index < 0 || index >= trackItems.length) return;

        const trackItem = trackItems[index];
        const audioSrc = trackItem.dataset.audio;

        // 全曲の「再生中」「歌詞表示」クラスを一度リセット
        trackItems.forEach(item => {
          item.classList.remove('playing');
          item.classList.remove('active'); // 歌詞を閉じる (Apple Music風: 再生時にその曲の歌詞を開く)
          item.querySelector('.play-trigger').textContent = '▶';
        });

        // プレイヤーに音源を設定して再生
        player.src = audioSrc;
        player.play();

        // UIの状態を更新
        trackItem.classList.add('playing');
        trackItem.classList.add('active'); // 再生した曲の歌詞を展開
        trackItem.querySelector('.play-trigger').textContent = '⏸'; // 一時停止アイコンに
        currentPlayingIndex = index;

        // 歌詞を読み込む
        loadLyrics(trackItem);
      }

      // --- 関数: 再生/一時停止のトグル ---
      function togglePlay(index) {
        if (index === currentPlayingIndex) {
          // 同じ曲のボタンが押された場合
          if (player.paused) {
            player.play();
            trackItems[index].querySelector('.play-trigger').textContent = '⏸';
          } else {
            player.paused();
            trackItems[index].querySelector('.play-trigger').textContent = '▶';
          }
        } else {
          // 違う曲が押された場合
          playTrack(index);
        }
      }

      // --- イベントリスナー設定 ---
      trackItems.forEach((item, index) => {
        const playBtn = item.querySelector('.play-trigger');
        const header = item.querySelector('.track-header');
        const title = item.querySelector('.track-title');

        // A. 再生ボタンクリック
        playBtn.addEventListener('click', (e) => {
          e.stopPropagation(); // ヘッダーのクリックイベント（歌詞展開）を防止
          togglePlay(index);
        });

        // B. 曲名エリア（ヘッダー）クリック -> 歌詞の展開/折りたたみ
        header.addEventListener('click', () => {
          // Apple Music風: すでに開いている歌詞を閉じて、クリックした曲を開く
          const isActive = item.classList.contains('active');
          
          // 一旦すべての歌詞を閉じる
          trackItems.forEach(t => t.classList.remove('active'));

          if (!isActive) {
            item.classList.add('active');
            loadLyrics(item); // 開いた時に歌詞読み込み
          }
          // すでにアクティブだった場合は、上の処理で閉じられる
        });
      });

      // --- プレイヤー（音響要素）のイベント監視 ---

      // 1. 曲が最後まで再生されたら自動的に次の曲へ
      player.addEventListener('ended', () => {
        let nextIndex = currentPlayingIndex + 1;
        
        // 最後の曲だったら最初に戻る（ループ）
        if (nextIndex >= trackItems.length) {
          nextIndex = 0; 
        }
        playTrack(nextIndex);
      });

      // 2. プレイヤー側で一時停止された時のUI反映
      player.addEventListener('pause', () => {
        if (currentPlayingIndex !== -1) {
          trackItems[currentPlayingIndex].querySelector('.play-trigger').textContent = '▶';
        }
      });

      // 3. プレイヤー側で再生再開された時のUI反映
      player.addEventListener('play', () => {
        if (currentPlayingIndex !== -1) {
          trackItems[currentPlayingIndex].querySelector('.play-trigger').textContent = '⏸';
        }
      });

      // 初期状態：1曲目の歌詞だけ読み込んでおく（再生はしない）
      if (trackItems.length > 0) {
        trackItems[0].classList.add('active');
        loadLyrics(trackItems[0]);
      }
    });
  </script>
